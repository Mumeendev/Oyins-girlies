<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Categories | Oyin's Girlies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="shop-page">
    <nav class="navbar">
        <div class="logo">OYIN'S <span>GIRLIES</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
        </ul>
    </nav>

    <main class="shop-main">
        <div class="shop-header reveal">
            <h1>Our <span>Collections</span></h1>
            <p>Select a category to explore our premium range</p>
        </div>

        <div class="category-wrapper reveal">
            <div class="category-list">
                <a href="cosmetics.html" class="cat-card" data-category="Cosmetics">
                    <span class="cat-number">01</span>
                    <span class="cat-name">Cosmetics</span>
                    <span class="cat-arrow">→</span>
                </a>
                <a href="skincare.html" class="cat-card" data-category="Skincare">
                    <span class="cat-number">02</span>
                    <span class="cat-name">Skincare</span>
                    <span class="cat-arrow">→</span>
                </a>
                <a href="haircare.html" class="cat-card" data-category="Hair care">
                    <span class="cat-number">03</span>
                    <span class="cat-name">Hair Care</span>
                    <span class="cat-arrow">→</span>
                </a>
                <a href="clothes.html" class="cat-card" data-category="Clothes">
                    <span class="cat-number">04</span>
                    <span class="cat-name">Clothes</span>
                    <span class="cat-arrow">→</span>
                </a>
                <a href="undies.html" class="cat-card" data-category="Undies">
                    <span class="cat-number">05</span>
                    <span class="cat-name">Undies</span>
                    <span class="cat-arrow">→</span>
                </a>
            </div>
        </div>
        
        <div class="background-blob"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
